<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赛事模板库 · 红烧扑克</title>
<link rel="stylesheet" href="../../assets/shared.css">
<link rel="icon" type="image/svg+xml" href="../../assets/icon.svg">
<meta name="theme-color" content="#0a0a0c">
<style>
  body {
    padding: 56px 18px 32px;
    background-image:
      radial-gradient(circle at 10% 0%, rgba(255,210,58,0.06) 0%, transparent 42%),
      radial-gradient(circle at 90% 100%, rgba(58,255,176,0.05) 0%, transparent 42%);
  }
  .wrap { max-width: 1180px; margin: 0 auto; }
  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 18px;
    margin-bottom: 22px;
  }
  h1 {
    font-family: var(--font-mono);
    font-size: var(--fs-lg);
    letter-spacing: -0.4px;
  }
  h1 span { color: var(--solved); }
  .subtitle {
    color: var(--text-faint);
    font-size: var(--fs-sm);
    margin-top: 8px;
    max-width: 760px;
  }
  .toolbar, .section {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px;
    margin-bottom: 14px;
  }
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .chip {
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 999px;
    padding: 7px 11px;
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
  }
  .chip.active {
    color: #000;
    background: var(--solved);
    border-color: var(--solved);
  }
  .template-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 12px;
  }
  .template-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px;
  }
  .template-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }
  .template-name {
    color: var(--text);
    font-weight: 700;
    font-size: var(--fs-md);
  }
  .badge {
    color: var(--solved);
    border: 1px solid rgba(255,210,58,0.35);
    border-radius: 999px;
    padding: 3px 8px;
    font-family: var(--font-mono);
    font-size: 10px;
    white-space: nowrap;
  }
  .badge.free { color: var(--good); border-color: rgba(58,255,176,0.35); }
  .meta {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 6px 10px;
    color: var(--text-dim);
    font-size: 12px;
    margin: 10px 0 12px;
  }
  .meta span:nth-child(odd) {
    color: var(--text-faint);
    font-family: var(--font-mono);
  }
  pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-dim);
    padding: 10px;
    overflow: auto;
    max-height: 180px;
    font-size: 11px;
    line-height: 1.55;
  }
  .actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }
  button {
    background: var(--solved);
    color: #000;
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-size: 13px;
  }
  button.secondary {
    background: var(--bg-input);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  textarea {
    width: 100%;
    min-height: 180px;
    margin-top: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 12px;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.6;
  }
  .section-title {
    font-family: var(--font-mono);
    color: var(--text-faint);
    font-size: var(--fs-tiny);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .note {
    color: var(--text-faint);
    font-size: 12px;
    line-height: 1.7;
  }
  .pro-status {
    display: inline-flex;
    margin-top: 10px;
    border: 1px solid rgba(255,210,58,0.38);
    color: var(--solved);
    background: rgba(255,210,58,0.08);
    border-radius: 999px;
    padding: 6px 10px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
  }
  .pro-status.is-active {
    color: var(--good);
    border-color: rgba(58,255,176,0.42);
    background: rgba(58,255,176,0.08);
  }
  .empty {
    color: var(--text-faint);
    border: 1px dashed var(--border);
    border-radius: var(--radius-md);
    padding: 18px;
    text-align: center;
    font-size: 13px;
  }
</style>
</head>
<body>
<a class="portal-back" href="../../index.html">← 工具集</a>
<div class="wrap">
  <header>
    <h1>赛事<span>模板库</span></h1>
    <p class="subtitle">常用赛事结构和自定义参数。</p>
    <span class="pro-status" id="pro-status">PRO PREVIEW</span>
  </header>

  <section class="toolbar">
    <div class="filter-row" id="kind-filter"></div>
    <div class="actions" style="margin-top:0;">
      <button class="secondary" onclick="exportAllTemplates()">导出全部 JSON</button>
      <button class="secondary" onclick="clearCustomTemplates()">清空本地模板</button>
    </div>
  </section>

  <section class="section">
    <div class="section-title">模板一览</div>
    <div class="template-grid" id="template-grid"></div>
  </section>

  <section class="section">
    <div class="section-title">新增本地模板</div>
    <p class="note">粘贴一个模板对象或数组。</p>
    <textarea id="custom-template-input">{
  "id": "my_local_day2_structure",
  "name": "My Local Day2 Structure",
  "kind": "mtt",
  "tier": "pro",
  "source_type": "user",
  "source_note": "Manually entered from public event info.",
  "collected_at": "2026-05-27",
  "params": {
    "field_size": 1200,
    "itm_percent": 15,
    "buy_in": 109,
    "starting_stack": 10000
  },
  "notes": [
    "Replace this sample with verified event parameters."
  ]
}</textarea>
    <div class="actions">
      <button onclick="saveCustomTemplate()">保存到本机</button>
      <button class="secondary" onclick="document.getElementById('custom-template-input').value=''">清空输入</button>
    </div>
  </section>
</div>

<script type="module">
import { renderProBadge } from '../../assets/pro-access.js';

const SAMPLE_URL = '../../data/tournament-structures/templates.sample.json';
const CUSTOM_KEY = 'hongshao_tournament_templates_v1';
let sourceTemplates = [];
let customTemplates = [];
let activeKind = 'all';

function readCustomTemplates() {
  try {
    const parsed = JSON.parse(window.localStorage.getItem(CUSTOM_KEY) || '[]');
    return Array.isArray(parsed) ? parsed : [];
  } catch {
    return [];
  }
}

function writeCustomTemplates(items) {
  window.localStorage.setItem(CUSTOM_KEY, JSON.stringify(items));
  customTemplates = items;
  render();
}

async function loadTemplates() {
  customTemplates = readCustomTemplates();
  try {
    const res = await fetch(SAMPLE_URL, { cache: 'no-store' });
    sourceTemplates = await res.json();
  } catch {
    sourceTemplates = [];
  }
  render();
}

function allTemplates() {
  return [...sourceTemplates, ...customTemplates];
}

function renderFilters() {
  const kinds = ['all', ...new Set(allTemplates().map(t => t.kind).filter(Boolean))];
  document.getElementById('kind-filter').innerHTML = kinds.map(kind => (
    `<button class="chip ${kind === activeKind ? 'active' : ''}" onclick="activeKind='${kind}';render();">${kind === 'all' ? '全部' : kind}</button>`
  )).join('');
}

function render() {
  renderFilters();
  const list = allTemplates().filter(t => activeKind === 'all' || t.kind === activeKind);
  const grid = document.getElementById('template-grid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty">暂无模板。请检查数据文件或新增本地模板。</div>';
    return;
  }
  grid.innerHTML = list.map(t => renderTemplateCard(t)).join('');
}

function renderTemplateCard(t) {
  const tier = t.tier || (t.source_type === 'generic' ? 'free' : 'pro');
  const params = t.params ? JSON.stringify(t.params, null, 2) : '{}';
  const notes = Array.isArray(t.notes) ? t.notes.join(' / ') : '';
  return `
    <article class="template-card">
      <div class="template-head">
        <div>
          <div class="template-name">${escapeHtml(t.name || t.id)}</div>
          <div class="note">${escapeHtml(t.id || '')}</div>
        </div>
        <span class="badge ${tier === 'free' ? 'free' : ''}">${escapeHtml(String(tier).toUpperCase())}</span>
      </div>
      <div class="meta">
        <span>kind</span><span>${escapeHtml(t.kind || '-')}</span>
        <span>source</span><span>${escapeHtml(t.source_type || '-')}</span>
        <span>collected</span><span>${escapeHtml(t.collected_at || '-')}</span>
        <span>note</span><span>${escapeHtml(t.source_note || '-')}</span>
      </div>
      <pre>${escapeHtml(params)}</pre>
      ${notes ? `<p class="note" style="margin-top:10px;">${escapeHtml(notes)}</p>` : ''}
      <div class="actions">
        <button onclick="copyTemplate('${escapeJs(t.id)}')">复制 JSON</button>
        <button class="secondary" onclick="downloadTemplate('${escapeJs(t.id)}')">下载</button>
      </div>
    </article>
  `;
}

function findTemplate(id) {
  return allTemplates().find(t => t.id === id);
}

async function copyTemplate(id) {
  const t = findTemplate(id);
  if (!t) return;
  await navigator.clipboard.writeText(JSON.stringify(t, null, 2));
}

function downloadTemplate(id) {
  const t = findTemplate(id);
  if (!t) return;
  downloadText(`${id}.json`, JSON.stringify(t, null, 2), 'application/json;charset=utf-8');
}

function exportAllTemplates() {
  downloadText('hongshao-tournament-templates.json', JSON.stringify(allTemplates(), null, 2), 'application/json;charset=utf-8');
}

function saveCustomTemplate() {
  const raw = document.getElementById('custom-template-input').value.trim();
  if (!raw) return;
  let parsed;
  try {
    parsed = JSON.parse(raw);
  } catch (err) {
    alert('JSON 格式错误: ' + err.message);
    return;
  }
  const incoming = Array.isArray(parsed) ? parsed : [parsed];
  const valid = incoming.filter(t => t && t.id && t.name && t.kind);
  if (!valid.length) {
    alert('至少需要 id、name、kind 三个字段。');
    return;
  }
  const merged = [...valid, ...customTemplates.filter(old => !valid.some(t => t.id === old.id))].slice(0, 50);
  writeCustomTemplates(merged);
}

function clearCustomTemplates() {
  writeCustomTemplates([]);
}

function downloadText(filename, text, type) {
  const blob = new Blob([text], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  }[ch]));
}

function escapeJs(s) {
  return String(s ?? '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

window.addEventListener('hongshao:pro-access-changed', () => renderProBadge('#pro-status'));
renderProBadge('#pro-status');
loadTemplates();
</script>
</body>
</html>
