<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>翻牌子集 · 红烧扑克</title>
<link rel="stylesheet" href="../../assets/shared.css">
<link rel="icon" type="image/svg+xml" href="../../assets/icon.svg">
<meta name="theme-color" content="#0a0a0c">
<style>
  body {
    padding: 56px 18px 48px;
    background-image:
      radial-gradient(ellipse at top right, rgba(255,107,157,0.05), transparent 50%),
      radial-gradient(ellipse at bottom left, rgba(255,155,61,0.04), transparent 50%);
  }
  .wrap { max-width: 1180px; margin: 0 auto; }

  /* ============ header ============ */
  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 18px;
    margin-bottom: 22px;
  }
  header h1 {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: var(--fs-lg);
    letter-spacing: -0.5px;
  }
  header h1 span { color: var(--accent); }
  header .subtitle {
    font-family: var(--font-mono);
    font-size: var(--fs-tiny);
    color: var(--text-faint);
    margin-top: 6px;
    letter-spacing: 0.04em;
  }
  .role-tag {
    display: inline-block;
    margin-top: 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    background: rgba(212, 255, 58, 0.08);
    border: 1px solid var(--accent-dim);
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }
  .source-note {
    margin-top: 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-faint);
    line-height: 1.6;
  }
  .source-note a {
    color: var(--text-dim);
    text-decoration: none;
    border-bottom: 1px dotted var(--text-faint);
  }
  .source-note a:hover { color: var(--accent); border-color: var(--accent); }

  /* ============ tabs ============ */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 18px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .tab {
    padding: 10px 18px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: var(--fs-sm);
    font-family: var(--font-mono);
    border-bottom: 2px solid transparent;
    background: transparent;
    border-radius: 0;
    transition: color .12s, border-color .12s;
  }
  .tab:hover { color: var(--text); opacity: 1; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .count { color: var(--text-faint); font-size: 11px; margin-left: 5px; }
  .tab.active .count { color: var(--accent); }

  /* ============ controls bar ============ */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 14px;
    align-items: center;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px 14px;
  }
  .filter-group {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .filter-chip {
    padding: 5px 10px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 11px;
    border-radius: 4px;
    cursor: pointer;
    transition: color .12s, border-color .12s, background .12s;
    letter-spacing: 0.04em;
  }
  .filter-chip:hover { color: var(--text); border-color: var(--border-bright); }
  .filter-chip.active {
    color: #0a0a0c;
    background: var(--accent);
    border-color: var(--accent);
  }
  .filter-chip .num { opacity: 0.7; margin-left: 4px; }
  .filter-chip.active .num { opacity: 0.85; }

  .action {
    padding: 7px 14px;
    background: var(--bg-input);
    color: var(--text-dim);
    border: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 11px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: color .12s, border-color .12s;
  }
  .action:hover { color: var(--accent); border-color: var(--accent-dim); opacity: 1; }

  .spacer { flex: 1; }
  .summary {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.04em;
  }
  .summary strong { color: var(--accent); font-weight: 700; }

  /* ============ flop grid ============ */
  .flop-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }
  .flop {
    position: relative;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 14px 12px 14px 28px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    transition: border-color .15s, background .15s, box-shadow .25s;
  }
  .flop:hover {
    border-color: var(--border-bright);
    background: var(--bg-hover);
  }
  .flop.highlight {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(212,255,58,0.18);
  }
  .flop .idx {
    position: absolute;
    top: 4px;
    left: 6px;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 0.05em;
  }
  .flop .tag {
    position: absolute;
    bottom: 4px;
    right: 8px;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 0.04em;
  }

  .card {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 42px;
    background: #f4f3ee;
    color: #0a0a0c;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 15px;
    line-height: 1;
    box-shadow: 0 1px 2px rgba(0,0,0,0.5);
    user-select: none;
  }
  .card.r { color: #c92020; }
  .card .suit { font-size: 11px; margin-top: 2px; }

  /* texture accent on left edge */
  .flop[data-texture="paired"] { border-left: 3px solid #ffd23a; padding-left: 25px; }
  .flop[data-texture="trips"]  { border-left: 3px solid #ff6b9d; padding-left: 25px; }
  .flop[data-texture="mono"]   { border-left: 3px solid #3affb0; padding-left: 25px; }

  /* ============ legend ============ */
  .legend {
    margin-top: 16px;
    padding: 12px 14px;
    background: rgba(255, 210, 58, 0.04);
    border-left: 3px solid var(--solved);
    border-radius: var(--radius-sm);
    font-size: var(--fs-sm);
    color: var(--text-dim);
    line-height: 1.7;
  }
  .legend strong { color: var(--solved); font-weight: 600; }
  .legend code {
    background: var(--bg-input);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
  }

  /* ============ responsive ============ */
  @media (max-width: 600px) {
    body { padding: 50px 12px 32px; }
    .flop-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    .card { width: 26px; height: 36px; font-size: 13px; }
    .card .suit { font-size: 10px; }
    .controls { padding: 10px; }
  }
</style>
</head>
<body>
<a class="portal-back" href="../../index.html">← 工具集</a>
<div class="wrap">

  <header>
    <h1>翻牌<span>子集</span></h1>
    <p class="subtitle">GTO Wizard 代表性翻牌子集 · 25 / 49 / 85 / 184</p>
    <span class="role-tag">桌上决策 · 训练参考</span>
    <p class="source-note">
      用于近似 1755 个策略不同翻牌的代表子集。子集越小求解越快，精度越低。
      数据来源 →
      <a href="https://blog.gtowizard.com/poker-subsets-and-abstractions/" target="_blank" rel="noopener">GTO Wizard blog</a>
    </p>
  </header>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="s25">25 子集</button>
    <button class="tab" data-tab="s49">49 子集</button>
    <button class="tab" data-tab="s85">85 子集</button>
    <button class="tab" data-tab="s184">184 子集</button>
  </div>

  <div class="controls">
    <div class="filter-group" id="filters">
      <button class="filter-chip active" data-filter="all">全部 <span class="num" id="num-all">0</span></button>
      <button class="filter-chip" data-filter="mono">同花 <span class="num" id="num-mono">0</span></button>
      <button class="filter-chip" data-filter="two-tone">两花 <span class="num" id="num-two-tone">0</span></button>
      <button class="filter-chip" data-filter="rainbow">彩虹 <span class="num" id="num-rainbow">0</span></button>
      <button class="filter-chip" data-filter="paired">对子 <span class="num" id="num-paired">0</span></button>
      <button class="filter-chip" data-filter="trips">三条 <span class="num" id="num-trips">0</span></button>
      <button class="filter-chip" data-filter="connected">连张 <span class="num" id="num-connected">0</span></button>
    </div>
    <div class="spacer"></div>
    <span class="summary">显示 <strong id="visible-count">0</strong> / <span id="total-count">0</span></span>
    <button class="action" id="random-btn">🎲 随机抽一</button>
    <button class="action" id="copy-btn">复制原始列表</button>
  </div>

  <div class="flop-grid" id="grid"></div>

  <div class="legend">
    <strong>纹理分类</strong>：
    <code>同花</code> 三张花色相同；
    <code>两花</code> 恰好两张同花色；
    <code>彩虹</code> 三张花色全不同；
    <code>对子</code> 含一对；
    <code>三条</code> 三张同点数；
    <code>连张</code> 三张点数连续（如 9-8-7、A-2-3）。
    分类互不排斥，一张翻牌可能同时属于多个。
  </div>

</div>

<script>
// =================== Data ===================
const SUBSETS = {
  s25: 'KhKdTs Kh8s7s 9s8s5h AsQs9h KsTsTh Js5h4d 9s6s2s AsQhQd 6s4h2d 8s6h2d Ts8h3s As6s5s AsAhKs 7s5h2s QhJs8s Ks9h3d As7h3d Ah5s4s Js9h6s QsTs2h 9s7h4d 8h4s3s Qs7h5d JhTs6s Js4h3s',
  s49: '7s3h2d QsJhTd QsTs8s KsTs9h 9s3s2h 3h3d2s Qs8s3s As6s6h Ts5h2d KsTsTh Js5h4d QhQdJs Qs4h2d KsQs2h AsJh7s 7s7h6s Ts7h5d Ts6h4d AsJs6h AhJsTs Ts7h6d AsAh7s Ks6s3h Qs7h3d Js8h2s 9s7s5s 5s4s4h 6s4s3s Ah5s2s As4h2d Qs7h6d AsKs3h KsTh8d AsTh8s 9h5s3s JsJh9s As9h3d Ks9h7d Ks8h4d QsTh9d 9s8s3h 8h7s4s KsKh7s 9s6s2h Js8s8h KhJs4s AsQs5h 8s6h5d Qs9h8d',
  s85: 'AsKhQs Ks6h4d Ts7h4d As7h4s 9h8s5s 7h6s3s Ts4h3s QhQdTs Js6s5h KhTs8s Qs9h4s 9h4s3s 7h6s2s Ts9s8s QsJh2d KhKd9s Th3s2s JsTh9s Kh7s2s Ts8h5d AsTh8d As6h3s 9h7s5s AsKhJd QsJh7d KhQs6s Js8h2d JsTh2d Js4s3h As5h3s KhQs5s 8s7s6h Qs9h9d 5s4s2s QsJs6h Qs7h2d KsQh5s QsThTd AsKh3d As9h6d KhKd3s As6h5s As4h2s Ts7h6s 9s6h3d Qs8h3d JsJh2s Kh5s3s 8s6h6d Js9h8s 4s2s2h 7s7h2s AsTh9d 9s3s3h Ts6h2s JsTh5s 8s8h2s Js8h5d As8h7s Qs9s2h AsTh5d 3s3h3d 8h5s2s As8h8d Js4s4h AsJh8s 9h6s4s As6h4d KsJs4h Qs5h3s Ks8s3s 8s2s2h Ks5h4d Qs4h4d 7s4h3d Ks9h7d Ks9s7s Ks3h2s AsQh7d 5h5d2s KsTs6h Js7s3h AhJs3s 8s6h4s Ts8h7d',
  s184: 'As5s3h 8s7h7d Ah9s5s 7h4s2s KsTh7d Kh6s2s 7s3h2s Ks6h4d KsJh4d 8s5s3h 6s6h3s AsQhTd 8s7s3h Ks9h2s AsQh9d KsJs2h KhTs8s AsKh2d Qs8h6d Js7h5d 5s4h3s Qs4h3d 5s4h2d Qs6s4s QhQd3s 9s3h2d As9h6s 9s8h4d AsJh6d 8s6h3s Qs8h2d Qs3h2d JhTs2s 8s7h4d Ah7s6s AsKsKh Js9h3d Kh8s4s Kh9s8s Js8s8h Ts6h6d As8s6s Ts9h6s AsTh2s AhKs3s QsQh8s Jh9s4s QsTh2s Qs7h4d 9h7s5s Th9s7s Ks4s2h Ks7s2s Js4h4d 9s4h3d AhQs9s AhAd4s Ah7s5s QhQdJs As9s4h As9h8d Th4s3s 6h5s4s 8s6s5s KsTh2d JsJh4s Ts9s8h 9h3s2s Qh7s6s QsJs7h 5s4s4h KsQs3s 8s7s6h Ks9h4d Qs9s3s Qs8h4s 7s6h5s QsTs9h AhJs2s As9s3h Ts2s2h Ts8h8d Js9h6d AsQs7s KsQh5d 9h5s2s Ks6h3d ThTd7s Th8s2s Js8h3s QsThTd AsQs5h JhTs6s Js9s7h AsKh7d KsQh3d Ts6h5d 8s3h2d As6h6d 7s3s2h 8s5h2s Js7h2s Ks7h5d Qs4h2d KsJh5d 8s7h5d 9s5h2s Js5s5h Ts7s5h 6s5s5h 9s6h4s AsKsQh Js8h4d Ts7s7h 6s5s2h KsJhJd AsTh7d 6s4s3h JsTh5s Qs8s2h AsAh4s Ks7h3d Js9h4s AsKs6h Th6s2s Js8h5d As8s6h KhKd4s KsTh4d AhAd6s Js9h2d As4s2s Qs5h2s 8h6s3s Ks8h7d 8s6h5s 5s3h3d Ks8s5s Ks7h6d KsTs3h JhJd5s AsJhTs Qs5h4d KhTs9s As8h8d As5s4h JsTs3h AsKh4d Ah9s2s KsTs6s KsKh4s AsJh3d AsJh8s Js4s2h AsQhQd 6s4h2d QhJs6s 9s6h3s KsJsTh QsJh3s ThTd6s Th6s3s As6s5h 9h9d7s QhJsTs Qs4h4d 9s8h3d QsTsTh 9s2h2d 7s6h3d Ts5h4d Ts7s3h AsAhTs 7s4s3h Ts5s3s Qs8h5s As8h5d KhJs5s Kh9s7s KsQsTh Qh8s7s JsTh8s Ks9s2h AhJs3s',
};

// =================== Helpers ===================
const RANK_ORDER = { '2':0,'3':1,'4':2,'5':3,'6':4,'7':5,'8':6,'9':7,'T':8,'J':9,'Q':10,'K':11,'A':12 };
const SUIT_SYM   = { h: '♥', d: '♦', s: '♠', c: '♣' };
const SUIT_RED   = { h: true, d: true, s: false, c: false };

function parseFlop(str) {
  const cards = [];
  for (let i = 0; i < str.length; i += 2) {
    cards.push({ r: str[i], s: str[i + 1] });
  }
  return cards;
}

function classify(cards) {
  const ranks = cards.map(c => c.r);
  const suits = cards.map(c => c.s);
  const rankCounts = ranks.reduce((m, r) => { m[r] = (m[r] || 0) + 1; return m; }, {});
  const distinctSuits = new Set(suits).size;

  const tags = [];
  if (distinctSuits === 1) tags.push('mono');
  else if (distinctSuits === 2) tags.push('two-tone');
  else tags.push('rainbow');

  const maxCount = Math.max(...Object.values(rankCounts));
  if (maxCount === 3) tags.push('trips');
  else if (maxCount === 2) tags.push('paired');

  // connected: three consecutive ranks (allow A-2-3 wheel)
  const rankVals = ranks.map(r => RANK_ORDER[r]).sort((a, b) => a - b);
  const isAce = ranks.includes('A');
  const isWheel = isAce && rankVals[1] === RANK_ORDER['2'] && rankVals[2] === RANK_ORDER['3'];
  const isStraight = rankVals[1] === rankVals[0] + 1 && rankVals[2] === rankVals[1] + 1;
  if (isStraight || isWheel) tags.push('connected');

  return tags;
}

function primaryTexture(tags) {
  if (tags.includes('trips')) return 'trips';
  if (tags.includes('paired')) return 'paired';
  if (tags.includes('mono')) return 'mono';
  return '';
}

// =================== State ===================
let activeTab = 's25';
let activeFilter = 'all';
let parsedFlops = [];

// =================== Render ===================
function renderTab(key) {
  activeTab = key;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === key));
  const list = SUBSETS[key].split(/\s+/).filter(Boolean);
  parsedFlops = list.map(raw => {
    const cards = parseFlop(raw);
    const tags = classify(cards);
    return { raw, cards, tags };
  });
  document.getElementById('total-count').textContent = parsedFlops.length;
  renderFilterCounts();
  applyFilter();
}

function renderFilterCounts() {
  const counts = { all: parsedFlops.length, mono: 0, 'two-tone': 0, rainbow: 0, paired: 0, trips: 0, connected: 0 };
  parsedFlops.forEach(f => f.tags.forEach(t => { counts[t] = (counts[t] || 0) + 1; }));
  for (const k of Object.keys(counts)) {
    const el = document.getElementById('num-' + k);
    if (el) el.textContent = counts[k];
  }
}

function applyFilter() {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === activeFilter));
  const filtered = activeFilter === 'all'
    ? parsedFlops
    : parsedFlops.filter(f => f.tags.includes(activeFilter));
  document.getElementById('visible-count').textContent = filtered.length;
  renderGrid(filtered);
}

function renderGrid(flops) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  flops.forEach((f, i) => {
    const idx = String(i + 1).padStart(3, '0');
    const cardsHTML = f.cards.map(c => {
      const red = SUIT_RED[c.s];
      return `<span class="card ${red ? 'r' : ''}">${c.r}<span class="suit">${SUIT_SYM[c.s]}</span></span>`;
    }).join('');
    const primary = primaryTexture(f.tags);
    const tagText = f.tags.filter(t => t !== 'rainbow').join(' · ') || '彩虹';
    const wrap = document.createElement('div');
    wrap.className = 'flop';
    if (primary) wrap.dataset.texture = primary;
    wrap.innerHTML = `
      <span class="idx">${idx}</span>
      ${cardsHTML}
      <span class="tag">${tagText}</span>
    `;
    wrap.title = f.raw;
    grid.appendChild(wrap);
  });
}

function highlightRandom() {
  const flops = document.querySelectorAll('.flop');
  if (!flops.length) return;
  flops.forEach(f => f.classList.remove('highlight'));
  const pick = flops[Math.floor(Math.random() * flops.length)];
  pick.classList.add('highlight');
  pick.scrollIntoView({ behavior: 'smooth', block: 'center' });
  setTimeout(() => pick.classList.remove('highlight'), 2400);
}

async function copyRaw() {
  const text = SUBSETS[activeTab];
  try {
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('copy-btn');
    const orig = btn.textContent;
    btn.textContent = '✓ 已复制';
    setTimeout(() => { btn.textContent = orig; }, 1400);
  } catch (e) {
    alert('复制失败：' + e.message);
  }
}

// =================== Wire up ===================
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => renderTab(t.dataset.tab));
});
document.querySelectorAll('.filter-chip').forEach(c => {
  c.addEventListener('click', () => { activeFilter = c.dataset.filter; applyFilter(); });
});
document.getElementById('random-btn').addEventListener('click', highlightRandom);
document.getElementById('copy-btn').addEventListener('click', copyRaw);

renderTab('s25');
</script>
</body>
</html>
